site_name: WotLK Extensions Documentation
site_url: https://sitename.example
theme:
  favicon: assets/logo/DLL_Icon.svg
  icon:
    logo: fontawesome/solid/w
  font:
    code: Red Hat Mono
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
  palette:
    scheme: slate
    primary: black

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details


extra:
  generator: false
  social:
    - icon: simple/youtube
      link: https://www.youtube.com/@DEVSylian
    - icon: simple/github
      link: https://github.com/Sylian1337


